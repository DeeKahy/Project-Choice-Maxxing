{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="header-row">
    <h1>Change Password</h1>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary btn-small">← Back</a>
</div>

{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% if success %}<p style="color: green;">{{ success }}</p>{% endif %}

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="card">
        <label for="old_password">Current Password</label>
        <input type="password" name="old_password" id="old_password" required>

        <label for="new_password">New Password</label>
        <input type="password" name="new_password" id="new_password" required minlength="4">

        <label for="confirm_password">Confirm New Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required minlength="4">
    </div>

    <button type="submit" class="btn btn-block">Update Password</button>
</form>
{% endblock %}
