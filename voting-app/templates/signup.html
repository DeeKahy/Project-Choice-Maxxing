{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<div class="card">
    <h1>Sign up</h1>

    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="username">Username</label>
        <input type="text" name="username" id="username" required maxlength="32"
               value="{{ form_username or '' }}"
               placeholder="alphanumerics, underscore, hyphen">

        <label for="password">Password</label>
        <input type="password" name="password" id="password" required minlength="4">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" name="confirm_password" id="confirm_password" required minlength="4">

        <button type="submit" class="btn-block mt-1">Create Account</button>
    </form>

    <p class="mt-1" style="font-size: 0.875rem;">
        Already have an account? <a href="{{ url_for('admin_login') }}">Log in</a>.
    </p>
</div>
{% endblock %}
