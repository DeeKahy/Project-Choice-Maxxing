name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    # Run the same suite the tests.yml workflow uses, so we never push an
    # image built from a regression that pytest would have caught.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        working-directory: voting-app
        run: pip install -r requirements.txt
      - name: Run pytest
        working-directory: voting-app
        run: python -m pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: voting-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/voting-app:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/voting-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/voting-app:buildcache,mode=max
