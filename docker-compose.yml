version: '3.8'

services:
  voting-app:
    image: ${DOCKERHUB_USERNAME}/voting-app:latest
    container_name: voting-app
    ports:
      - "5000:5000"
    volumes:
      # This mounts a persistent volume for data storage
      - voting_data:/app/data
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      # IMPORTANT: set FLASK_SECRET_KEY to a long random string in production.
      # Without it the key is auto-generated into /app/data/.secret_key, which
      # works but is harder to rotate and audit.
      # - FLASK_SECRET_KEY=replace-me-with-a-random-64-char-string
      # Initial admin credentials seeded on first boot only:
      # - FLASK_ADMIN_USER=admin
      # - FLASK_ADMIN_PASS=change-me

volumes:
  # This creates a named volume that persists between container updates
  voting_data:
    driver: local